name: Helldivers Data Collection

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r personal_projects/helldivers2/data_collection/requirements.txt

      - name: Validate API contact secret
        env:
          HD2_CONTACT_EMAIL: ${{ secrets.HD2_CONTACT_EMAIL }}
        run: |
          if [ -z "$HD2_CONTACT_EMAIL" ]; then
            echo "Missing required secret: HD2_CONTACT_EMAIL"
            exit 1
          fi

      - name: Run hourly collector
        env:
          HD2_CLIENT_NAME: ${{ vars.HD2_CLIENT_NAME }}
          HD2_CONTACT_EMAIL: ${{ secrets.HD2_CONTACT_EMAIL }}
          LOG_LEVEL: INFO
        run: python personal_projects/helldivers2/data_collection/collector.py

      - name: Commit and push updated history
        run: |
          if [ -z "$(git status --porcelain -- personal_projects/helldivers2/data_collection/planet_history.csv)" ]; then
            echo "No history changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f personal_projects/helldivers2/data_collection/planet_history.csv
          git commit -m "Update Helldivers planet history"
          git push
